<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>戦国人間関係クイズ</title>

<meta name="description" content="戦国武将の親子・主従・裏切り・政略結婚を当てる歴史クイズ">

<link rel="stylesheet" href="style.css">

<!-- Google Adsense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
}

header{
  text-align:center;
  padding:24px 10px;
}

#title{
  margin:0;
  font-size:32px;
}

#desc{
  color:#666;
  margin-top:10px;
}

#menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:10px;
}

#menu a{
  background:#222;
  color:#fff;
  text-decoration:none;
  padding:10px 16px;
  border-radius:8px;
  font-size:14px;
}

.layout{
  display:grid;
  grid-template-columns:220px minmax(0,760px) 220px;
  gap:20px;
  max-width:1320px;
  margin:30px auto;
  padding:0 16px;
  align-items:start;
}

.quiz-box{
  background:#fff;
  border-radius:16px;
  padding:24px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.status{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
  font-weight:bold;
}

.progress{
  width:100%;
  height:10px;
  background:#ddd;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:20px;
}

#bar{
  width:0%;
  height:100%;
  background:#4caf50;
}

#question{
  line-height:1.7;
  margin-bottom:20px;
}

#choices{
  display:grid;
  gap:12px;
}

#choices button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:#eee;
  cursor:pointer;
  font-size:16px;
  transition:.2s;
}

#choices button:hover{
  background:#ddd;
}

#result{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-top:20px;
  min-height:40px;
}

.ad-side{
  min-height:280px;
}

.ad-right{
  margin-left:30px;
}

@media(max-width:900px){

  .layout{
    display:block;
  }

  .ad-side{
    margin:20px 0;
  }

  .ad-right{
    margin-left:0;
  }

}

</style>
</head>

<body>

<header>
  <h1 id="title">戦国人間関係クイズ</h1>
  <p id="desc">好きなクイズを選んで挑戦しよう</p>
</header>

<nav id="menu"></nav>

<div class="layout">

  <!-- 左広告 -->
  <aside class="ad-side">

    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-8398161859137802"
         data-ad-slot="6325875393"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

  </aside>

  <!-- クイズ -->
  <main class="quiz-box">

    <div class="status">
      <span id="count">読み込み中...</span>
      <span id="score">スコア:0</span>
    </div>

    <div class="progress">
      <div id="bar"></div>
    </div>

    <h2 id="question">
      問題を読み込んでいます...
    </h2>

    <div id="choices"></div>

    <p id="result"></p>

  </main>

  <!-- 右広告 -->
  <aside class="ad-side ad-right">

    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-8398161859137802"
         data-ad-slot="6325875393"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>

    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

  </aside>

</div>

<!-- クイズデータ -->
<script src="data/parent-child.js"></script>
<script src="data/bad-relations.js"></script>
<script src="data/marriage.js"></script>
<script src="data/lord-vassal.js"></script>
<script src="data/betrayed.js"></script>
<script src="data/relatives.js"></script>
<script src="data/nobunaga-target.js"></script>

<!-- メイン -->
<script src="script.js"></script>

</body>
</html>
